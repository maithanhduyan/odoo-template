services:
  postgres:
    # image: postgres:17
    build:
      context: .
      dockerfile: ./postgres/Dockerfile.18
    container_name: postgres
    env_file:
      - ./postgres/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/log:/var/log/postgresql
    networks:
      - odoo-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: ./odoo/Dockerfile
    container_name: odoo
    expose:
      - "8069"
      - "8072"
    volumes:
      - ./odoo/data:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/log:/var/log/odoo
    env_file:
      - ./odoo/.env
    environment:
      - "HOST=${ODOO_HOST:-odoo}"
      - "PORT=${ODOO_PORT:-8069}"
      - "WS_PORT=${ODOO_WS_PORT:-8072}"
      - "DB_HOST=${DB_HOST:-postgres}"
      - "DB_PORT=${DB_PORT:-5432}"
      - "DB_USER=${DB_USER:-odoo}"
      - "DB_PASSWORD=${DB_PASSWORD:-odoo}"
      - "DB_NAME=${DB_NAME:-odoo}"
      - "WORKERS=${WORKERS:-0}"
      - "S3_ENDPOINT=http://${MINIO_HOST:-minio}:${MINIO_PORT:-9000}"
      - "S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}"
      - "S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}"
      - "S3_BUCKET=${S3_BUCKET:-odoo}"
      - "CHROMADB_HOST=${CHROMADB_HOST:-chromadb}"
      - "CHROMADB_PORT=${CHROMADB_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      chromadb:
        condition: service_healthy
    networks:
      - odoo-net
    restart: unless-stopped

  minio:
    # image: minio/minio:latest
    build:
      context: .
      dockerfile: ./minio/Dockerfile
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000" # API (internal only)
      - "9001" # Console (internal only)
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - odoo-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; mc mb --ignore-existing local/$${S3_BUCKET}; mc anonymous set download local/$${S3_BUCKET}; mc mb --ignore-existing local/$${S3_BUCKET}-configs; mc anonymous set none local/$${S3_BUCKET}-configs; echo 'MinIO buckets ready (media=public, configs=private)'; "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-odoo}
    networks:
      - odoo-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    expose:
      - "8000"
    volumes:
      - ./chromadb/data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - odoo-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    # image: nginx:alpine
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - "ODOO_HOST=${ODOO_HOST:-odoo}"
      - "ODOO_PORT=${ODOO_PORT:-8069}"
      - "ODOO_WS_PORT=${ODOO_WS_PORT:-8072}"
      - "ENABLE_DB_MANAGER=${ENABLE_DB_MANAGER:-false}"
      - "MINIO_HOST=${MINIO_HOST:-minio}"
      - "MINIO_PORT=${MINIO_PORT:-9000}"
      - "ODOO_WORKERS=${WORKERS:-0}"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/log:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/cache:/var/cache/nginx/odoo
    depends_on:
      - odoo
    networks:
      - odoo-net
    restart: unless-stopped

  pgadmin:
    # image: dpage/pgadmin4:latest
    build:
      context: .
      dockerfile: ./pgadmin/Dockerfile
    container_name: pgadmin
    networks:
      - odoo-net
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./pgadmin/data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}

networks:
  odoo-net:
    driver: bridge
