map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Nginx cache zone for images and static files
proxy_cache_path /var/cache/nginx/odoo levels=1:2
                 keys_zone=odoo_cache:20m max_size=2g
                 inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Dynamic DNS resolver (prevents stale IP caching on upstream redeploy)
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;
    resolver_timeout 5s;

    # Upstream variables for dynamic DNS resolution
    set $odoo_http http://${ODOO_HOST}:${ODOO_PORT};
    set $odoo_ws http://${ODOO_HOST}:${ODOO_WS_PORT};
    set $minio_backend http://${MINIO_HOST}:${MINIO_PORT};

    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/origin.pem;
    # ssl_certificate_key /etc/nginx/ssl/origin.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Block access to config files (security) ──
    location /s3-media/configs/ {
        return 403;
    }

    # ── Direct MinIO media serving (bypasses Odoo Python) ──
    # Serves filestore files directly from MinIO bucket
    location /s3-media/ {
        rewrite ^/s3-media/(.*) /odoo/$1 break;
        proxy_pass $minio_backend;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-meta-server-side-encryption;
        proxy_hide_header x-amz-server-side-encryption;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;

        proxy_cache odoo_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 30d;
    }

    # ── Websocket ──
    # workers=0: single-process → websocket on 8069
    # workers>0: gevent worker → websocket on 8072
    location /websocket {
        proxy_pass ${WEBSOCKET_PROXY_RULE};
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Odoo image endpoints with nginx caching ──
    location ~* ^/web/image/ {
        proxy_pass $odoo_http;
        proxy_redirect off;
        proxy_cache odoo_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 301 302 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_key $scheme$proxy_host$request_uri;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    location ~* ^/web/content/ {
        proxy_pass $odoo_http;
        proxy_redirect off;
        proxy_cache odoo_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_key $scheme$proxy_host$request_uri;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # ── Static assets caching ──
    location ~* /web/static/ {
        proxy_pass         $odoo_http;
        proxy_cache        odoo_cache;
        proxy_cache_valid  200 60d;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=5184000, immutable";
        expires            60d;
    }

    # ── SSE streaming for AI chat (disable buffering) ──
    location /cashion/chat/stream {
        proxy_pass         $odoo_http;
        proxy_redirect     off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 120s;
    }

    # ── All other traffic → HTTP workers (port 8069) ──
    location / {
        proxy_pass    $odoo_http;
        proxy_redirect off;
    }

    # Block database management endpoints (toggle via ENABLE_DB_MANAGER env)
    location ~* ^/web/database/ {
        ${DB_MANAGER_RULE}
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/json application/javascript image/svg+xml;

    # Increase max upload size (for import, attachments)
    client_max_body_size 100m;
}
